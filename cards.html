<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartes - Rafael Bank</title>
  <link rel="shortcut icon" href="img/logo.jpg">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="cards">
  <div class="container">
    <div class="topbar">
      <h2>Ma carte</h2>
      <div class="top-actions">
        <button class="btn-link secondary" id="logoutBtn">Se déconnecter</button>
      </div>
    </div>

    <div id="cardPinSetup" class="card" style="display:none; margin-bottom:16px;">
      <h3>Configurer le code PIN de la carte</h3>
      <p class="small">Choisis un code PIN à 4 chiffres pour protéger ta carte.</p>
      <div class="row">
        <input id="newCardPin" type="password" maxlength="4" placeholder="PIN 4 chiffres">
        <button id="saveCardPinBtn">Enregistrer le PIN</button>
      </div>
    </div>

    <div class="row">
      <select id="cardTypeSelect">
        <option value="classic">Classique</option>
        <option value="premium">Premium</option>
        <option value="black">Black</option>
      </select>
    </div>

    <div class="status-pill" id="cardStatusText">Carte active</div>

    <div class="card3d">
      <div id="cardInner" class="card-inner">
        <div class="card-front" id="cardFront">
          <div class="card-chip"></div>
          <div class="bank-logo">Rafael Bank</div>

          <div class="card-number" id="maskedCardNumber">**** **** **** 4821</div>

          <div class="card-meta">
            <span id="cardOwnerName">UTILISATEUR</span>
            <span id="maskedExpiry">••/••</span>
          </div>

          <div class="card-bottom-logos">
            <div class="apple-pay-logo"> Pay</div>
            <div class="visa-logo">VISA</div>
          </div>
        </div>

        <div class="card-back" id="cardBack">
          <div class="black-strip"></div>
          <p class="small">CVV</p>
          <div class="cvv-box" id="maskedCvv">***</div>
          <p class="small" style="margin-top:8px;">
            IBAN : <span id="cardIban">FR76 XXXX XXXX XXXX XXXX XXXX XXX</span>
          </p>
        </div>
      </div>
    </div>

    <div class="row">
      <button id="showFullCardBtn">Voir les infos</button>
      <button class="secondary" id="flipCardBtn">Retourner la carte</button>
      <button id="toggleCardBlockBtn">Activer / Bloquer</button>
    </div>
  </div>

  <nav>
    <a href="home.html">Accueil</a>
    <a href="cards.html">Cartes</a>
    <a href="payments.html">Paiement</a>
    <a href="crypto.html">Crypto</a>
    <a id="adminNavLink" href="admin.html" style="display:none;">Admin</a>
  </nav>

  <script type="module" src="app.js"></script>
</body>
</html>
