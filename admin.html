<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Rafael Bank</title>
  <link rel="shortcut icon" href="img/logo.jpg">
  <link rel="stylesheet" href="style.css">
</head>

<body data-page="admin">
  <div class="container">
    <div class="topbar">
      <h2>Admin Dashboard</h2>
      <div class="top-actions">
        <button class="btn-link secondary" id="logoutBtn">Se déconnecter</button>

<script type="module">
  import { logoutUser } from "./auth.js";

  const btn = document.getElementById("logoutBtn");
  if (btn) {
    btn.addEventListener("click", async () => {
      await logoutUser();
      window.location.href = "login.html";
    });
  }
</script>
      </div>
    </div>

    <div class="card">
      <h3>Vue globale des joueurs</h3>
      <p class="small">Visible uniquement pour le compte admin.</p>
    </div>

    <div id="adminUsersList" style="margin-top:16px;"></div>
  </div>

    <nav>
        <a href="home.html">Accueil</a>
        <a href="cards.html">Cartes</a>
        <a href="payments.html">Paiement</a>
        <a href="crypto.html">Crypto</a>
        <a id="adminNavLink" href="admin.html" style="display:none;">Admin</a>
    </nav>

  <script type="module" src="app.js"></script>
</body>
</html>
