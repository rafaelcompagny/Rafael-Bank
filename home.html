<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil - Rafael Bank</title>
  <link rel="shortcut icon" href="img/logo.jpg">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="home">
  <div class="container">
    <div class="topbar">
      <div>
        <h2>Accueil</h2>
        <p class="small" id="welcomeUser">Bienvenue</p>
      </div>
      <div class="top-actions">
        <button class="btn-link secondary" id="logoutBtn">Se déconnecter</button>
      </div>
    </div>

    <div class="card">
      <p class="small">Solde principal</p>
      <h2 id="balance">0.00 €</h2>
      <p class="small" id="clickLevelText">Gain par clic : 1 €</p>
    </div>

    <p id="boostInfo" class="small"></p>

    <div class="row">
      <button id="clickBtn">+1 clic</button>
      <button id="bonusBtn">Bonus journalier</button>
      <button id="upgradeBtn">Améliorer le clic</button>
      <button class="secondary" id="boostBtn">x2 argent (1 min)</button>
      <button id="adminAddMoneyBtn" style="display:none;" id="adminAddMoneyBtn">Ajouter de l'argent</button>
    </div>

    <div class="card" style="margin-top:16px;">
      <h3>Progression</h3>
      <p id="clickUpgradeInfo"></p>
    </div>

    <div class="card" style="margin-top:16px;">
      <h3>Crédits</h3>
      <div class="row">
        <button id="loan500Btn">Crédit 500 €</button>
        <button id="loan2000Btn">Crédit 2 000 €</button>
        <button id="loan10000Btn">Crédit 10 000 €</button>
        <button class="secondary" id="repayAllBtn">Rembourser tout</button>
      </div>
      <p id="loanInfo"></p>
      <p id="loanTimer" class="small"></p>
      <div id="loanList"></div>
    </div>

    <h3 style="margin-top:20px;">Historique global</h3>
    <div id="history"></div>
  </div>

  <nav>
    <a href="home.html">Accueil</a>
    <a href="cards.html">Cartes</a>
    <a href="payments.html">Paiement</a>
    <a href="crypto.html">Crypto</a>
    <a id="adminNavLink" href="admin.html" style="display:none;">Admin</a>
  </nav>

  <script type="module" src="app.js"></script>
</body>
</html>
