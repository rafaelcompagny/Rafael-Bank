<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto - Rafael Bank</title>
  <link rel="shortcut icon" href="img/logo.jpg">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="crypto">
  <div class="container">
    <div class="topbar">
      <h2>Portefeuille</h2>
      <div class="top-actions">
        <button class="btn-link secondary" id="logoutBtn">Se déconnecter</button>
      </div>
    </div>

    <p id="portfolio"></p>
    <p id="cashBalance"></p>

    <select id="assetSelect">
      <option value="BTC">Bitcoin</option>
      <option value="ETH">Ethereum</option>
      <option value="AAPL">Apple</option>
      <option value="TSLA">Tesla</option>
      <option value="NVDA">Nvidia</option>
      <option value="RCOP">Rafael Company</option>
    </select>

    <canvas id="cryptoChart" height="120"></canvas>

    <p id="price"></p>
    <p id="holding"></p>
    <p id="pnl"></p>

    <div id="adminCryptoPanel" class="card" style="display:none; margin-bottom:16px;">
      <h3>Contrôle admin des cryptos</h3>
      <p class="small">Active ou coupe l'évolution automatique, puis choisis les prix manuellement.</p>

      <div class="row">
        <button id="toggleCryptoModeBtn">Passer en mode manuel</button>
      </div>

      <div class="row">
        <select id="adminAssetSelect">
          <option value="BTC">Bitcoin</option>
          <option value="ETH">Ethereum</option>
          <option value="AAPL">Apple</option>
          <option value="TSLA">Tesla</option>
          <option value="NVDA">Nvidia</option>
          <option value="RCOP">Rafael Company</option>
        </select>

        <input id="adminAssetPrice" type="number" min="0.01" step="0.01" placeholder="Nouveau prix">
        <button id="adminSetCryptoPriceBtn">Appliquer le prix</button>
      </div>

      <p id="cryptoModeInfo" class="small"></p>
    </div>

    <div class="row">
      <input id="investAmount" type="number" min="0" step="0.01" placeholder="Montant à investir">
      <button id="buyBtn">Acheter</button>
    </div>

    <div class="row">
      <input id="sellAmount" type="number" min="0" step="0.000001" placeholder="Quantité à vendre">
      <button id="sellPartialBtn">Vendre une partie</button>
      <button class="secondary" id="sellAllBtn">Vendre tout</button>
    </div>

    <h3>Transactions</h3>
    <div id="cryptoHistory"></div>
  </div>

  <nav>
    <a href="home.html">Accueil</a>
    <a href="cards.html">Cartes</a>
    <a href="payments.html">Paiement</a>
    <a href="crypto.html">Crypto</a>
    <a id="adminNavLink" href="admin.html" style="display:none;">Admin</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
