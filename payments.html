<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Paiements - Rafael Bank</title>
  <link rel="shortcut icon" href="img/logo.jpg">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="payments">
  <div class="container">
    <div class="topbar">
      <h2>Virements</h2>
      <div class="top-actions">
        <button id="newsBellBtn" class="secondary">🔔</button>
        <button class="btn-link secondary" id="logoutBtn">Se déconnecter</button>
      </div>
    </div>

    <div class="card">
      <p class="small">Solde disponible</p>
      <h2 id="paymentBalance">0.00 €</h2>
      <p class="small">Ton IBAN : <span id="myIban"></span></p>
    </div>

    <div class="row">
      <input id="paymentName" type="text" placeholder="Nom du bénéficiaire">
      <input id="iban" type="text" placeholder="IBAN du bénéficiaire">
    </div>

    <div class="row">
      <input id="amount" type="number" min="0" step="0.01" placeholder="Montant">
      <button onclick="transfer()">Envoyer</button>
    </div>

    <div class="row">
      <button onclick="addContact()">Ajouter un contact</button>
      <button class="secondary" onclick="renderAllUsersAsContacts()">Actualiser comptes Rafael Bank</button>
    </div>

    <div id="adminPanel" class="card" style="margin-top:16px; display:none;">
      <h3>Mode admin</h3>
      <p class="small">Envoi d'argent interne Rafael Bank</p>
      <div class="row">
        <input id="adminTargetUser" type="text" placeholder="Nom du joueur">
        <input id="adminAmount" type="number" min="0" step="0.01" placeholder="Montant">
        <button onclick="adminSendMoney()">Envoyer comme admin</button>
      </div>
    </div>

    <h3>Contacts</h3>
    <div id="contactsList"></div>
  </div>

  <nav>
    <a href="home.html"><span>🏠</span><small>Accueil</small></a>
    <a href="boutique.html"><span>🛒</span><small>Boutique</small></a>
    <a href="crypto.html"><span>📈</span><small>Crypto</small></a>
    <a href="payments.html"><span>💸</span><small>Paiement</small></a>
    <a href="mission.html"><span>🎯</span><small>Missions</small></a>
    <a href="leaderboard.html"><span>🏆</span><small>Top</small></a>
    <a id="adminNavLink" href="admin.html" style="display:none;"><span>🛡️</span><small>Admin</small></a>
  </nav>

  <div id="newsPopup" class="news-popup" style="display:none;">
    <div class="news-popup-content">
      <div class="row">
        <h3>📰 News</h3>
        <button id="closeNewsPopupBtn" class="secondary">Fermer</button>
      </div>
      <div id="newsPopupContent">Chargement...</div>
    </div>
  </div>

  <script type="module" src="firebase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
